<!DOCTYPE html>
<html>
<head>

<title>Creator Tools</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

input{
padding:12px;
width:300px;
border-radius:8px;
border:none;
margin-top:20px;
}

button{
padding:12px 18px;
margin:10px;
border:none;
border-radius:8px;
background:#ff4444;
color:white;
cursor:pointer;
}

#result{
margin-top:30px;
padding:20px;
background:#222;
border-radius:10px;
}

</style>

</head>

<body>

<h1>🚀 Creator Tools</h1>

<input id="topic" placeholder="Enter topic">

<br>

<button onclick="titleGen()">Title</button>

<button onclick="descGen()">Description</button>

<button onclick="tagGen()">Tags</button>

<button onclick="hashGen()">Hashtags</button>

<div id="result"></div>

<script>

function titleGen(){

let topic=document.getElementById("topic").value

document.getElementById("result").innerText=
"10 Amazing Facts About "+topic+" | Must Watch"

}

function descGen(){

let topic=document.getElementById("topic").value

document.getElementById("result").innerText=
"This video explains everything about "+topic+" in simple words."

}

function tagGen(){

let topic=document.getElementById("topic").value

document.getElementById("result").innerText=
topic+", viral video, youtube shorts, trending"

}

function hashGen(){

let topic=document.getElementById("topic").value

document.getElementById("result").innerText=
"#viral #shorts #youtube #"+topic

}

</script>

</body>
</html>
